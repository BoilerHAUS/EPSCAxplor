name: Corpus Drift Check

# EPSCA reissues wage schedules mid-cycle, so the checked-in corpus silently
# goes stale. Once a month, diff epsca.org against corpus_manifest.yaml and
# open (or update) an issue when documents are reissued, added, or removed.
on:
  schedule:
    - cron: "0 8 1 * *" # 08:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    name: Check corpus drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx pyyaml

      - name: Run corpus drift check
        id: drift
        working-directory: services/ingestion
        run: |
          set +e
          python3 check_corpus_drift.py > "$RUNNER_TEMP/drift.md"
          code=$?
          set -e
          cat "$RUNNER_TEMP/drift.md"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          # Exit 2 is a fetch/parse failure — fail the run so it's noticed.
          # Exit 1 is drift (handled below); exit 0 is a clean corpus.
          if [ "$code" -eq 2 ]; then
            echo "::error::Corpus drift check failed to run (fetch or parse error)"
            exit 1
          fi

      - name: Open or update drift issue
        if: steps.drift.outputs.code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Corpus drift detected against epsca.org"
          # The label aids discovery; create it defensively (no-op if it exists).
          gh label create corpus-drift \
            --color FBCA04 \
            --description "Automated epsca.org corpus drift report" 2>/dev/null || true
          existing=$(gh issue list --state open \
            --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Updating existing drift issue #$existing"
            gh issue comment "$existing" --body-file "$RUNNER_TEMP/drift.md"
          else
            echo "Opening a new drift issue"
            gh issue create --title "$TITLE" \
              --label corpus-drift --body-file "$RUNNER_TEMP/drift.md"
          fi
