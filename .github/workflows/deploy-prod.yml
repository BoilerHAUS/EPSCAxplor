name: Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/boilerhaus/epscaxplor

# Never let two production releases deploy at once; queue them instead of
# racing (an interrupted rollout is worse than a slightly delayed one).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # Run the same full gate as dev (ruff, mypy, pytest, ingestion tests, tsc,
  # eslint) before a production release — a prod deploy should never pass a
  # weaker check than a merge to main.
  validate:
    uses: ./.github/workflows/validate.yml

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-api:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-api:buildcache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-web:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-web:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-web:buildcache,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Record release target
        env:
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          # Rollback trail: the images pushed above are pinned to this SHA and
          # tag. To roll back, point the Dokploy GIT_SHA env var at a prior SHA
          # (see docs/runbooks/deploy.md) — every build stays available in GHCR.
          echo "Releasing $REF @ $SHA"
          echo "  API image: ${IMAGE_PREFIX}-api:${SHA}"
          echo "  Web image: ${IMAGE_PREFIX}-web:${SHA}"

      - name: Trigger Dokploy redeploy — API
        run: |
          if [ -z "${{ secrets.DOKPLOY_PROD_WEBHOOK_API }}" ]; then
            echo "::error::DOKPLOY_PROD_WEBHOOK_API secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DOKPLOY_TOKEN }}" ]; then
            echo "::error::DOKPLOY_TOKEN secret is not set"
            exit 1
          fi
          BODY=$(mktemp)
          HTTP=$(curl -s -o "$BODY" -w "%{http_code}" --max-time 30 \
            -X POST "${{ secrets.DOKPLOY_PROD_WEBHOOK_API }}" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}")
          echo "Response: $HTTP"
          if [ "$HTTP" -ne 200 ] && [ "$HTTP" -ne 202 ]; then
            echo "::error::Dokploy API webhook returned HTTP $HTTP"
            cat "$BODY"
            exit 1
          fi

      - name: Trigger Dokploy redeploy — Web
        run: |
          if [ -z "${{ secrets.DOKPLOY_PROD_WEBHOOK_WEB }}" ]; then
            echo "::error::DOKPLOY_PROD_WEBHOOK_WEB secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DOKPLOY_TOKEN }}" ]; then
            echo "::error::DOKPLOY_TOKEN secret is not set"
            exit 1
          fi
          BODY=$(mktemp)
          HTTP=$(curl -s -o "$BODY" -w "%{http_code}" --max-time 30 \
            -X POST "${{ secrets.DOKPLOY_PROD_WEBHOOK_WEB }}" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}")
          echo "Response: $HTTP"
          if [ "$HTTP" -ne 200 ] && [ "$HTTP" -ne 202 ]; then
            echo "::error::Dokploy Web webhook returned HTTP $HTTP"
            cat "$BODY"
            exit 1
          fi

  verify:
    name: Verify Production Health
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for the production API to report healthy
        env:
          BASE: ${{ vars.PROD_API_URL }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          # A 200 from the webhook only means Dokploy accepted the trigger, not
          # that the new release is live and its dependencies are reachable.
          # Poll /health (200 only when database + Qdrant + Ollama are all ok,
          # 503 otherwise) until it converges, so a deploy that crashloops or
          # loses a dependency fails the release instead of passing silently.
          if [ -z "$BASE" ]; then
            echo "::error::PROD_API_URL repository variable is not set"
            exit 1
          fi
          BASE="${BASE%/}"
          echo "Verifying $BASE/health for $REF (@ $SHA)"
          # Give the rolling redeploy a head start before the first poll.
          sleep 20
          deadline=$(( $(date +%s) + 300 ))
          attempt=0
          body=$(mktemp)
          until [ "$(date +%s)" -ge "$deadline" ]; do
            attempt=$((attempt + 1))
            code=$(curl -s -o "$body" -w "%{http_code}" --max-time 10 "$BASE/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Healthy after $attempt attempt(s):"
              cat "$body"; echo
              exit 0
            fi
            echo "attempt $attempt: HTTP $code — not healthy yet, retrying in 15s…"
            sleep 15
          done
          echo "::error::Production /health did not report healthy within ~5 minutes of deploy"
          cat "$body" 2>/dev/null || true
          exit 1
