name: Deploy to Dev

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/boilerhaus/epscaxplor

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-api:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-api:buildcache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-web:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-web:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-web:buildcache,mode=max

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trigger Dokploy redeploy — API
        run: |
          if [ -z "${{ secrets.DOKPLOY_WEBHOOK_API }}" ]; then
            echo "::error::DOKPLOY_WEBHOOK_API secret is not set"
            exit 1
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_API }}" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}")
          echo "Response: $HTTP"
          if [ "$HTTP" -ne 200 ] && [ "$HTTP" -ne 202 ]; then
            echo "::error::Dokploy API webhook returned HTTP $HTTP"
            exit 1
          fi

      - name: Trigger Dokploy redeploy — Web
        run: |
          if [ -z "${{ secrets.DOKPLOY_WEBHOOK_WEB }}" ]; then
            echo "::error::DOKPLOY_WEBHOOK_WEB secret is not set"
            exit 1
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_WEB }}" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}")
          echo "Response: $HTTP"
          if [ "$HTTP" -ne 200 ] && [ "$HTTP" -ne 202 ]; then
            echo "::error::Dokploy Web webhook returned HTTP $HTTP"
            exit 1
          fi
